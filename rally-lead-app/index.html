<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kingshot Rally Optimizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #060810; }
      input[type="number"] {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        background: #060810;
        border: 1px solid #1c2333;
        color: #dfe4ee;
        padding: 5px 6px;
        border-radius: 4px;
        width: 70px;
        text-align: right;
      }
      input[type="number"]:focus { outline: none; border-color: #c8961a; }
      input[type="number"]::-webkit-inner-spin-button { opacity: .3; }
      select {
        font-family: 'Rajdhani', sans-serif;
        font-size: 13px;
        background: #0c1018;
        border: 1px solid #1c2333;
        color: #dfe4ee;
        padding: 5px 8px;
        border-radius: 4px;
        cursor: pointer;
      }
      select:focus { outline: none; border-color: #c8961a; }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-thumb { background: #1c2333; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
