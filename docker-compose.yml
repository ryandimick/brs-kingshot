# Production stack — Caddy (HTTPS + reverse proxy + static) + API + Postgres.
# Build:   docker compose build
# Run:     docker compose up -d
# Tear:    docker compose down

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rally_lead}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rally_lead}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rally_lead}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./rally-lead-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-rally_lead}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rally_lead}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CORS_ORIGINS: ${SITE_ADDRESS_URL:-http://localhost}
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    build:
      context: .
      dockerfile: docker/Dockerfile.caddy
      args:
        VITE_API_BASE_URL: /api
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  pg_data:
  caddy_data:
  caddy_config:
